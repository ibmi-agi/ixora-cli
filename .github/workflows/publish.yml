name: Release and Publish to NPM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [created]

jobs:
  release:
    name: Release and Publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$CURRENT_VERSION" ]; then
            npm version "$TAG_VERSION" --no-git-tag-version
          fi

      - name: Install dependencies
        # Drop the lockfile then `npm install`. The lockfile may have been
        # regenerated on a different platform and pins out optional
        # platform-specific deps (e.g. @rollup/rollup-linux-x64-gnu, pulled
        # in by tsup/rollup). Both `npm ci` and `npm install` honor that
        # exclusion if the lockfile is present — see npm/cli#4828. Removing
        # the lockfile lets npm resolve all optionals fresh on Linux.
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
